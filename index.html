<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CollegeMarket ⚡ — Seller Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #000428, #004e92);
      color: #00eaff;
      margin: 0;
      min-height: 100vh;
    }
    .btn {
      background: linear-gradient(90deg, #00eaff, #0077ff);
      color: #001a33;
      border: none;
      padding: 12px 25px;
      font-weight: bold;
      border-radius: 8px;
      box-shadow: 0 0 15px #00eaff;
      transition: 0.3s;
      cursor: pointer;
    }
    .btn:hover {
      background: #003b80;
      color: #00eaff;
      box-shadow: 0 0 25px #00eaff;
    }
    .card {
      background: rgba(0, 20, 40, 0.85);
      border: 1px solid #00eaff;
      border-radius: 12px;
      box-shadow: 0 0 25px #00eaff80;
      padding: 20px;
    }
    input, textarea {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      background: #001a33;
      border: 1px solid #00eaff;
      color: white;
      border-radius: 6px;
    }
    .small-btn {
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
    .edit-btn { background: linear-gradient(90deg,#ffd24d,#ff9e00); color:#001; border: none; }
    .del-btn { background: linear-gradient(90deg,#ff6b6b,#ff3b3b); color: #001; border: none; }
    .progress {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#00eaff,#0077ff);
      transition: width 0.15s;
    }

    /* Keep dashboard buttons not full width and centered */
    .dashboard-buttons {
      display: flex;
      flex-direction: column;
      align-items: center; /* center horizontally */
      gap: 12px;
      margin-bottom: 16px;
    }
    .dashboard-buttons .btn {
      width: auto; /* not full width */
      padding-left: 22px;
      padding-right: 22px;
    }

    /* Small responsive tweaks to ensure layout works on small screens */
    @media (max-width: 640px) {
      .card { padding: 16px; }
      .btn { padding: 10px 18px; }
    }
  </style>
</head>

<body class="p-6">
  <!-- Landing Page -->
  <div id="landingPage" class="flex flex-col items-center justify-center min-h-screen text-center">
    <h1 class="text-4xl font-bold mb-4 text-blue-400">⚡ CollegeMarket ⚡</h1>
    <p class="text-blue-200 mb-6">"A way to Buy & Sell in College — Fast, Secure, Futuristic!"</p>
    <div class="space-x-4">
      <button id="goSeller" class="btn">I'm a Seller</button>
      <button id="goBuyer" class="btn">I'm a Buyer</button>
    </div>
  </div>

  <!-- Seller Authentication -->
  <div id="authContainer" class="hidden flex flex-col items-center mt-10">
    <div class="card w-full max-w-3xl text-center">
      <h2 class="text-2xl mb-4 text-blue-300">🔐 Seller Login / Signup</h2>

      <!-- Single Show Password checkbox (Option A) visible for both forms -->
      <div class="mb-4 text-left px-6">
        <label class="text-blue-200">
          <input type="checkbox" id="showPasswords" class="mr-2 align-middle">
          Show Password
        </label>
      </div>

      <div id="signupForm">
        <input id="signupEmail" type="email" placeholder="Email" required>
        <input id="signupPassword" type="password" placeholder="Password" required>
        <button id="signupBtn" class="btn w-full mt-2">Sign Up</button>
        <p class="text-sm mt-2">Already have an account?
          <a href="#" id="showLogin" class="text-blue-400 underline">Login here</a>
        </p>
      </div>

      <div id="loginForm" class="hidden">
        <input id="loginEmail" type="email" placeholder="Email" required>
        <input id="loginPassword" type="password" placeholder="Password" required>
        <button id="loginBtn" class="btn w-full mt-2">Login</button>
        <p class="text-sm mt-2">Don’t have an account?
          <a href="#" id="showSignup" class="text-blue-400 underline">Sign up here</a>
        </p>
      </div>

      <button id="backHomeAuth" class="btn w-full mt-4 bg-gray-700 text-blue-300">🏠 Back</button>
    </div>
  </div>

  <!-- Seller Dashboard -->
  <div id="sellerPage" class="hidden card w-full max-w-4xl mx-auto mt-10">
    <!-- Heading -->
    <h2 class="text-2xl text-blue-300 font-bold mb-4">🚀 Seller Dashboard</h2>

    <!-- Buttons moved inside box, vertical stack, not full width, centered -->
    <div class="dashboard-buttons">
      <button id="addToggle" class="btn">Add Product</button>
      <button id="logoutBtn" class="btn bg-red-600">Logout</button>
    </div>

    <!-- Add/Edit Form -->
    <div id="productFormContainer" class="hidden mb-6">
      <form id="productForm" class="space-y-2">
        <input type="text" id="sellerName" placeholder="Seller Name (visible to buyers)" required>
        <input type="text" id="productName" placeholder="Product Name" required>
        <input type="number" id="price" placeholder="Price (₹)" required>
        <textarea id="description" placeholder="Description" required></textarea>
        <input type="email" id="email" placeholder="Contact Email" required>
        <input type="text" id="phone" placeholder="Phone (optional)">
        <input type="text" id="insta" placeholder="Instagram ID (optional)">

        <label class="text-blue-300">Choose Image</label>
        <input type="file" id="imageFile" accept="image/*">
        <img id="previewImg" class="w-full h-48 object-cover mt-2 rounded hidden" alt="preview">

        <div class="progress hidden" id="imgProgress"><div id="imgBar"></div></div>

        <div class="flex space-x-2">
          <button id="saveProductBtn" class="btn" type="submit">Save Product</button>
          <button id="cancelProductBtn" class="btn bg-gray-700" type="button">Cancel</button>
        </div>
      </form>
    </div>

    <h3 class="text-lg text-blue-200 mb-3">Your Products</h3>
    <div id="myProductsList" class="grid sm:grid-cols-1 lg:grid-cols-2 gap-4"></div>
    <p id="noProductsMsg" class="text-gray-400 text-center mt-4 hidden">No products yet — add your first product above.</p>
  </div>

  <!-- Buyer Page -->
  <div id="buyerPage" class="hidden card w-full max-w-5xl mx-auto mt-10">
    <h2 class="text-2xl text-center mb-4 text-blue-300">💠 CollegeMarket Products</h2>
    <div id="productList" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <button id="backHomeBuyer" class="btn w-full mt-6 bg-gray-700 text-blue-300">🏠 Back</button>
  </div>

  <!-- Firebase Script -->
  <script src="script.js"></script>
</body>
</html>
